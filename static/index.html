<!DOCTYPE html>
<html lang="en">
<head>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Research Agent</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    .container {
      width: 100%;
      max-width: 800px;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 8px;
      background: linear-gradient(90deg, #6c63ff, #48cfad);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      color: #666;
      margin-bottom: 32px;
      font-size: 0.95rem;
    }

    .input-row {
      display: flex;
      gap: 10px;
      margin-bottom: 24px;
    }

    input {
      flex: 1;
      padding: 14px 18px;
      background: #1e1e2e;
      border: 1px solid #2e2e3e;
      border-radius: 10px;
      color: #e0e0e0;
      font-size: 1rem;
      outline: none;
      transition: border 0.2s;
    }

    input:focus {
      border-color: #6c63ff;
    }

    button {
      padding: 14px 24px;
      background: linear-gradient(90deg, #6c63ff, #48cfad);
      border: none;
      border-radius: 10px;
      color: white;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
      white-space: nowrap;
    }

    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    .status {
      display: none;
      align-items: center;
      gap: 10px;
      color: #6c63ff;
      margin-bottom: 20px;
      font-size: 0.95rem;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid #6c63ff33;
      border-top-color: #6c63ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .result { display: none; }

    .plan-box {
      background: #1a1a2e;
      border: 1px solid #2e2e3e;
      border-radius: 10px;
      padding: 16px 20px;
      margin-bottom: 20px;
      font-size: 0.85rem;
      color: #888;
    }

    .plan-box strong {
      color: #6c63ff;
      display: block;
      margin-bottom: 6px;
    }

    .answer-box {
      background: #1e1e2e;
      border: 1px solid #2e2e3e;
      border-radius: 10px;
      padding: 24px;
      margin-bottom: 20px;
      line-height: 1.7;
      white-space: pre-wrap;
      font-size: 0.95rem;
    }

    .sources {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .sources strong {
      color: #48cfad;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .source-link {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      background: #1a1a2e;
      border: 1px solid #2e2e3e;
      border-radius: 8px;
      text-decoration: none;
      color: #aaa;
      font-size: 0.85rem;
      transition: border-color 0.2s;
    }

    .source-link:hover {
      border-color: #48cfad;
      color: #e0e0e0;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #48cfad;
      flex-shrink: 0;
    }

    .error {
      color: #ff6b6b;
      background: #2a1a1a;
      border: 1px solid #ff6b6b44;
      border-radius: 10px;
      padding: 16px;
      display: none;
    }
    .answer-box h1, .answer-box h2, .answer-box h3 {
    color: #a78bfa;
    margin: 16px 0 8px;
    }
    .answer-box strong { color: #e0e0e0; }
    .answer-box a { color: #48cfad; }
    .answer-box table {
      border-collapse: collapse;
      width: 100%;
      margin: 12px 0;
    }
    .answer-box td, .answer-box th {
      border: 1px solid #2e2e3e;
      padding: 8px 12px;
      text-align: left;
    }
    .answer-box th { background: #1a1a2e; color: #a78bfa; }
    .answer-box ul, .answer-box ol { padding-left: 20px; }
    .answer-box li { margin: 4px 0; 
    }
    
  </style>
</head>
<body>
  <div class="container">
    <h1>🔍 AI Research Agent</h1>
    <p class="subtitle">Ask anything. The agent searches, scrapes, and synthesizes a real answer.</p>

    <div class="input-row">
      <input
        id="questionInput"
        type="text"
        placeholder="e.g. Find the latest trends in AI in Europe..."
        onkeydown="if(event.key==='Enter') askAgent()"
      />
      <button id="askBtn" onclick="askAgent()">Ask Agent</button>
    </div>

    <div class="status" id="status">
      <div class="spinner"></div>
      <span id="statusText">Searching the web...</span>
    </div>

    <div class="error" id="error"></div>

    <div class="result" id="result">
      <div class="plan-box">
        <strong>📋 Research Plan</strong>
        <span id="planText"></span>
      </div>
      <div class="answer-box" id="answerText"></div>
      <div class="sources">
        <strong>📚 Sources</strong>
        <div id="sourcesList"></div>
      </div>
    </div>
  </div>

  <script>
    const API_URL = "https://web-production-7876f.up.railway.app";

    const steps = [
      "Planning research approach...",
      "Searching the web...",
      "Scraping pages in parallel...",
      "Synthesizing answer with Claude...",
    ];

    async function askAgent() {
      const question = document.getElementById("questionInput").value.trim();
      if (!question) return;

      // Reset UI
      document.getElementById("result").style.display = "none";
      document.getElementById("error").style.display = "none";
      document.getElementById("askBtn").disabled = true;

      // Show loading
      const status = document.getElementById("status");
      const statusText = document.getElementById("statusText");
      status.style.display = "flex";

      // Cycle through steps
      let stepIndex = 0;
      statusText.textContent = steps[0];
      const interval = setInterval(() => {
        stepIndex = (stepIndex + 1) % steps.length;
        statusText.textContent = steps[stepIndex];
      }, 3000);

      try {
        const response = await fetch(`${API_URL}/agent`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ question })
        });

        if (!response.ok) throw new Error(`Server error: ${response.status}`);
        const data = await response.json();

        // Show result
        document.getElementById("planText").textContent = data.plan;
        document.getElementById("answerText").innerHTML = marked.parse(data.answer);

        const sourcesList = document.getElementById("sourcesList");
        sourcesList.innerHTML = data.sources.map(s => `
          <a class="source-link" href="${s.url}" target="_blank">
            <div class="dot"></div>
            ${s.title || s.url}
          </a>
        `).join("");

        document.getElementById("result").style.display = "block";

      } catch (err) {
        const error = document.getElementById("error");
        error.textContent = `Error: ${err.message}`;
        error.style.display = "block";
      } finally {
        clearInterval(interval);
        status.style.display = "none";
        document.getElementById("askBtn").disabled = false;
      }
    }
  </script>
</body>
</html>
